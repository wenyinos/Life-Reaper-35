name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# 设置权限
permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '10.0.x'
  APP_NAME: "Life Reaper"
  OUTPUT_DIR: installer/output

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 还原依赖
      run: dotnet restore

    - name: 编译
      run: dotnet build --configuration Release --no-restore

    - name: 运行测试(如果有)
      run: dotnet test --no-build --verbosity normal
      continue-on-error: true

    - name: 发布自包含应用
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:PublishReadyToRun=true `
          --output publish

    - name: 上传发布文件
      uses: actions/upload-artifact@v4
      with:
        name: LifeReaper-portable
        path: publish/
        if-no-files-found: error

  build-installer:
    needs: build
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 下载发布文件
      uses: actions/download-artifact@v4
      with:
        name: LifeReaper-portable
        path: publish

    - name: 安装 Inno Setup
      run: |
        choco install innosetup --no-progress --yes
        RefreshEnv

    - name: 创建输出目录
      run: |
        if (!(Test-Path "installer\output")) {
          New-Item -ItemType Directory -Path "installer\output"
        }

    - name: 构建安装包
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\setup.iss"

    - name: 上传安装包
      uses: actions/upload-artifact@v4
      with:
        name: LifeReaper-setup
        path: installer/output/LifeReaper-Setup.exe
        if-no-files-found: error

  release:
    needs: build-installer
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: 下载发布文件
      uses: actions/download-artifact@v4
      with:
        name: LifeReaper-portable
        path: LifeReaper-portable

    - name: 下载安装包
      uses: actions/download-artifact@v4
      with:
        name: LifeReaper-setup
        path: LifeReaper-setup

    - name: 创建压缩包
      run: |
        Compress-Archive -Path LifeReaper-portable/* -DestinationPath LifeReaper-portable-x64.zip
        Copy-Item LifeReaper-setup/LifeReaper-Setup.exe LifeReaper-Setup-x64.exe

    - name: 创建 Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          LifeReaper-portable-x64.zip
          LifeReaper-Setup-x64.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
