name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  PROJECT_NAME: LifeReaper

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build project (Release)
      run: |
        msbuild "Life Reaper.csproj" /p:Configuration=Release /p:TargetFrameworkVersion=v3.5

    - name: Create release folder
      run: |
        mkdir release
        Copy-Item "bin\Release\${{ env.PROJECT_NAME }}.exe" -Destination "release\${{ env.PROJECT_NAME }}.exe"
        Copy-Item "bin\Release\${{ env.PROJECT_NAME }}.pdb" -Destination "release\" -ErrorAction SilentlyContinue
        Copy-Item "bin\Release\*.config" -Destination "release\" -ErrorAction SilentlyContinue
        Copy-Item "README.md" -Destination "release\" -ErrorAction SilentlyContinue
        Copy-Item "LICENSE" -Destination "release\" -ErrorAction SilentlyContinue

    - name: Create ZIP archive
      run: |
        Compress-Archive -Path "release\*" -DestinationPath "${{ env.PROJECT_NAME }}.zip" -Force

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}
        path: ${{ env.PROJECT_NAME }}.zip

    - name: Get version from tag
      if: startsWith(github.ref, 'refs/tags/')
      id: get_version
      run: |
        $version = "${{ github.ref_name }}"
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.PROJECT_NAME }}.zip
        name: Release ${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
